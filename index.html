<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reddit-to-Lemmy Extractor</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="color-breath"></div>
    <!-- Single-page UI for community creation, progress polling, and tracked-community status. -->
    <div class="layout">
      <main>
        <h1>Reddit to Lemmy Community Creator</h1>
        <section class="panel">
          <form id="create-form">
            <div class="input-row">
              <input
                type="text"
                id="subreddit"
                placeholder="https://www.reddit.com/r/Ooer/"
              />
              <button id="create-button" type="submit">
                Create Lemmy Community
              </button>
            </div>
          </form>

          <section id="progress-shell" class="progress-shell">
            <div id="progress-copy" class="progress-copy">
              Creating community...
            </div>
            <progress id="progress-bar" value="0" max="100"></progress>
            <div id="progress-stats" class="progress-stats">0 / 100 posts</div>
          </section>
          <div id="output"></div>
        </section>
      </main>
      <aside>
        <section class="panel">
          <h2>Tracked Subreddits</h2>
          <div id="community-list-status">Loading communities...</div>
          <ul id="community-list" class="community-list"></ul>
        </section>
      </aside>
    </div>
    <script src="/static/app.js" defer></script>
  </body>
</html>
