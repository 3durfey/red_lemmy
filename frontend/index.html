<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reddit-to-Lemmy Extractor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: auto; padding: 20px; background: #1a1a1a; color: #eee; }
        input { width: 70%; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        pre { background: #000; padding: 20px; border-radius: 8px; border: 1px solid #333; overflow-x: auto; color: #00ff41; }
    </style>
</head>
<body>
    <h1>Reddit to Lemmy Community Creator</h1>
    <div style="margin-bottom: 20px;">
        <input type="text" id="subreddit" placeholder="technology">
        <button onclick="createCommunity()">Create Lemmy Community</button>
    </div>
    <div id="output"></div>

    <script>
        async function createCommunity() {
            const subreddit = document.getElementById('subreddit').value;
            const output = document.getElementById('output');
            output.innerHTML = "Creating community...";

            const redditUrl = `https://www.reddit.com/r/${subreddit}`;

            try {
                const res = await fetch('/create-community', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ redditUrl })
                });

                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`HTTP ${res.status}: ${res.statusText} - ${text}`);
                }

                const data = await res.json();
                if (data.success) {
                    const communityLink = `https://lemmy.world/c/${subreddit}_lemmy`;
                    output.innerHTML = `<p>Community created! <a href="${communityLink}" target="_blank">${communityLink}</a></p>`;
                } else {
                    output.innerHTML = `<p>Error: ${data.error}</p>`;
                }
            } catch (error) {
                output.innerHTML = `<p>Failed to create community: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
